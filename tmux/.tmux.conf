set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g prefix C-Space
unbind C-b
bind-key C-Space send-prefix
set -s escape-time 10

set-option -g default-shell /bin/zsh
set-option -g history-limit 10000
# Allow passthrough of escape sequences
set-option -g allow-passthrough on

unbind %
bind | split-window -h 

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.tmux.conf

bind j resize-pane -D 5
bind k resize-pane -U 5
bind l resize-pane -R 5
bind h resize-pane -L 5

# Smart pane switching with awareness of Vim splits
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

bind -r m resize-pane -Z

# File manager popup
bind e display-popup \
    -d "#{pane_current_path}" \
    -w 90% \
    -h 90% \
    -E "ranger"

set -g mouse on

# Copy mode vi
set-window-option -g mode-keys vi

bind h copy-mode \; send -X start-of-line \;

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection -x
bind P paste-buffer

# set-option -g default-command "reattach-to-user-namespace -l zsh" # copy pasting between tmux and system clipboard

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @yank_action 'copy-pipe' # stay in copy mode after yank

set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'


# Style
gray_light="#D8DEE9"
gray_medium="#ABB2BF"
gray_dark="#3B4252"
green_soft="#A3BE8C"
blue_muted="#81A1C1"
cyan_soft="#88C0D0"
rose_soft="#D39AA7"
rose_muted="#B97A8A"
rose_bg="#4A313A"
yellow_soft="#EBCB8B"

set -g pane-active-border-style "fg=${yellow_soft}"

set -g status-position top
set -g status-left-length 100
set -g status-style "fg=${gray_light},bg=${rose_bg}"
set -g status-left "#[fg=${green_soft},bold] #S #[fg=${gray_light},nobold] | "
set -g status-right ""
set -g window-status-current-format "#[fg=${cyan_soft},bold]  #[underscore]#I:#W#[nounderscore]#{?window_zoomed_flag, 󰍋 ,}"
set -g window-status-format "#[fg=${gray_medium}] #I:#W"
set -g message-style "fg=${gray_light},bg=default"
set -g mode-style "fg=${gray_dark},bg=${blue_muted}"
set -g pane-border-style "fg=${gray_dark}"
set -g pane-active-border-style "fg=${green_soft}"

# bind ctrl + f to tmux-sessionizer
bind-key -r f run-shell "tmux new-window ~/.local/bin/tmux-sessionizer"
# bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection -x
# # Custom yank that stays in copy mode (vi mode)
# bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"
#
# bind-key -T copy-mode-vi y send-keys -X copy-selection \; display-message "Copied!"

set -g bell-action none

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
